version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ensto_sales_tool
      POSTGRES_USER: ensto
      POSTGRES_PASSWORD: ensto
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_NAME: "ENSTO Sales Tool API"
      ENVIRONMENT: "docker"
      DATABASE_URL: "postgresql+psycopg://ensto:ensto@db:5432/ensto_sales_tool"
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:

